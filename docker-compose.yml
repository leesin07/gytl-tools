version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gytl-tools
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_APP_NAME=GYTL-Tools
      - NEXT_PUBLIC_APP_VERSION=1.0.0
    restart: unless-stopped
    networks:
      - gytl-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 可选：使用Nginx作为反向代理
  nginx:
    image: nginx:alpine
    container_name: gytl-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # 如果使用HTTPS
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - gytl-network
    profiles:
      - nginx  # 可选服务

networks:
  gytl-network:
    driver: bridge

volumes:
  ssl:  # 用于存储SSL证书
